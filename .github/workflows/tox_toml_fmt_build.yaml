name: 📦 tox-toml-fmt
on:
  workflow_dispatch:
    inputs:
      release:
        description: "🚀 Release (semver bump)?"
        required: true
        default: "no"
        type: choice
        options: ["no", patch, minor, major]
  push:
    branches: ["main"]
    paths:
      - "common/**"
      - "toml-fmt-common/**"
      - "tox-toml-fmt/**"
      - ".github/workflows/tox_toml_fmt_build.yaml"
      - ".github/workflows/_build.yaml"
  pull_request:
  schedule:
    - cron: "0 8 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}${{ github.event.inputs.release && github.event.inputs.release != 'no' && '-release' || '' }}
  cancel-in-progress: ${{ github.event.inputs.release == 'no' || github.event.inputs.release == null }}

jobs:
  changes:
    name: 🔍 changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run: ${{ github.event_name != 'pull_request' || steps.filter.outputs.run == 'true' }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🔍 Check for changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            run:
              - 'common/**'
              - 'toml-fmt-common/**'
              - 'tox-toml-fmt/**'
              - '.github/workflows/tox_toml_fmt_build.yaml'
              - '.github/workflows/_build.yaml'

  build:
    needs: changes
    uses: ./.github/workflows/_build.yaml
    with:
      package-name: tox-toml-fmt
      pre-commit-mirror: tox-dev/tox-toml-fmt
      run: ${{ needs.changes.outputs.run }}
    secrets: inherit # zizmor: ignore[secrets-inherit]
    permissions:
      contents: write
      id-token: write
      pull-requests: read

  release:
    name: 🚀 release
    runs-on: ubuntu-24.04
    environment:
      name: release
      url: https://pypi.org/project/tox-toml-fmt/${{ needs.build.outputs.version }}
    permissions:
      id-token: write
      contents: write
    if: github.event.inputs.release != 'no' && github.event.inputs.release != null && github.ref == 'refs/heads/main'
    needs: [build]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          persist-credentials: true
      - name: 📥 Download source
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: source
          path: .
      - name: 👀 Show changes
        run: git diff HEAD -u
      - name: 💾 Commit release
        run: |
          git config --global user.name 'Bernat Gabor'
          git config --global user.email 'gaborbernat@users.noreply.github.com'
          git commit -am "Release tox-toml-fmt ${VERSION} [skip ci]"
        env:
          VERSION: ${{ needs.build.outputs.version }}
      - name: 📥 Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: "true"
      - name: 👀 Show wheels
        run: ls -lth dist
      - name: 🚀 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true
      - name: 📢 Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
          CHANGELOG: ${{ needs.build.outputs.changelog }}
        run: |
          git pull --rebase origin main
          git tag "tox-toml-fmt/${VERSION}"
          git push
          git push --tags
          gh release create "tox-toml-fmt/${VERSION}" \
              --title="tox-toml-fmt/${VERSION}" --verify-tag \
            --notes "${CHANGELOG}"
      - name: 🔄 Trigger pre-commit mirror sync
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: gh workflow run main.yaml --repo "tox-dev/tox-toml-fmt"
