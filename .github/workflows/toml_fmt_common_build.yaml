name: 📦 toml-fmt-common
# toml-fmt-common is no longer published: it is bundled into each consumer wheel at
# release time (see tasks/bundle_common.py). This workflow only builds it for CI.
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 8 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}${{ github.event.inputs.release && github.event.inputs.release != 'no' && '-release' || '' }}
  cancel-in-progress: ${{ github.event.inputs.release == 'no' || github.event.inputs.release == null }}

permissions:
  contents: read

env:
  dists-artifact-name: python-package-distributions

jobs:
  changes:
    name: 🔍 changes
    runs-on: ubuntu-latest
    outputs:
      run: ${{ github.event_name != 'pull_request' || steps.filter.outputs.run == 'true' }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: 🔍 Check for changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            run:
              - 'toml-fmt-common/**'
              - '.github/workflows/toml_fmt_common_build.yaml'

  build:
    name: 🔨 build
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      changelog: ${{ steps.v.outputs.changelog }}
    defaults:
      run:
        working-directory: toml-fmt-common
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: 📦 Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: 📝 Generate changelog
        id: v
        run: |
          echo "version=$(uv version)" >> "$GITHUB_OUTPUT"
          uv run ../tasks/changelog.py toml-fmt-common "${{ github.event.number }}" "${{ github.event.pull_request.base.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 🔨 Build package
        run: uv build --python 3.14 --python-preference only-managed --sdist --wheel . --out-dir dist
      - name: 📤 Store the distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.dists-artifact-name }}
          path: toml-fmt-common/dist/*

  all-pass:
    name: ✅ toml-fmt-common-build
    if: always()
    needs: [changes, build]
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether all jobs passed or were skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "Some jobs failed or were canceled"
            exit 1
          fi
          echo "All jobs passed or were skipped"
