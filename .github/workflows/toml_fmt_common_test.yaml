name: 🧪 toml-fmt-common
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags-ignore: ["**"]
  pull_request:
  schedule:
    - cron: "0 8 * * *"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  changes:
    name: 🔍 changes
    runs-on: ubuntu-latest
    outputs:
      run: ${{ github.event_name != 'pull_request' || steps.filter.outputs.run == 'true' }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🔍 Check for changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            run:
              - 'toml-fmt-common/**'
              - '.github/workflows/toml_fmt_common_test.yaml'
  test:
    name: 🐍 ${{ matrix.env }}
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    environment: test
    strategy:
      fail-fast: false
      matrix:
        env: ["3.14", "3.13", "3.12", "3.11", "3.10", type, pkg_meta]
    defaults:
      run:
        working-directory: toml-fmt-common
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: 📦 Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          cache-dependency-glob: "pyproject.toml"
      - name: 🔧 Install tox
        run: uv tool install --python-preference only-managed --python 3.14 tox --with tox-uv
      - name: 🐍 Install Python
        if: startsWith(matrix.env, '3.') && matrix.env != '3.14'
        run: uv python install --python-preference only-managed ${{ matrix.env }}
      - name: 🔧 Setup test suite
        run: tox run -vv --notest --skip-missing-interpreters false -e ${{ matrix.env }}
      - name: ✅ Run test suite
        run: tox run --skip-pkg-install -e ${{ matrix.env }}
        env:
          PYTEST_ADDOPTS: "-vv --durations=20"
      - name: 📤 Upload coverage
        if: startsWith(matrix.env, '3.')
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: toml-fmt-common/.tox/${{ matrix.env }}
          flags: python-${{ matrix.env }}
  all-pass:
    name: ✅ toml-fmt-common
    if: always()
    needs: [changes, test]
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether all jobs passed or were skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "Some jobs failed or were canceled"
            exit 1
          fi
          echo "All jobs passed or were skipped"
